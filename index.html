<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MUJ Purity Test</title>

  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

  <div class="container">

    <h1>💀 MUJ Purity Test 💀</h1>

    <p class="description">
      The lower your score, the more chaotic your MUJ life has been.
    </p>

    <div class="warning">
      ⚠️ This test is just for fun. Don’t take the results too seriously.
    </div>

    <div class="visitors">
      <span>Visitors:</span>
      <span id="visitorCount">Loading...</span>
    </div>

    <!-- Questions -->
    <div id="questions"></div>

    <!-- Button -->
    <button id="submitBtn">
      Calculate My Score
    </button>

    <!-- Result -->
    <div id="result"></div>

    <footer>
      Made with chaos during college life.
    </footer>

  </div>

  <script src="questions.js"></script>
  <script src="script.js?v=2"></script>

</body>

</html>
